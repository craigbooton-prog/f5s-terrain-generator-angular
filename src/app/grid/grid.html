<svg
  class="wfc-grid"
  [class.flat]="flat()"
  [attr.viewBox]="'0 0 ' + width() + ' ' + height()"
  [attr.width]="width()"
  [attr.height]="height()"
  preserveAspectRatio="xMidYMid meet"
  shape-rendering="crispEdges"
>
  @for (p of placements(); track p.key) {
    <rect
      [attr.x]="p.x"
      [attr.y]="p.y"
      [attr.width]="cellPixels()"
      [attr.height]="cellPixels()"
      [attr.class]="terrainClass(p.terrain)"
    />
  }

  @if (finiteInventoryOverlays().length > 0) {
    <g class="finite-inventory-overlays">
      @for (o of finiteInventoryOverlays(); track o.key) {
        <rect
          class="finite-inventory-overlay"
          [attr.x]="o.x"
          [attr.y]="o.y"
          [attr.width]="tilePixels()"
          [attr.height]="tilePixels()"
        />
      }
    </g>
  }

  @if (showCellLines()) {
    <g class="celllines">
      @for (l of cellLines(); track l.key) {
        <line
          [attr.x1]="l.x1"
          [attr.y1]="l.y1"
          [attr.x2]="l.x2"
          [attr.y2]="l.y2"
        />
      }
    </g>
  }

  @if (showGridLines()) {
    <g class="gridlines">
      @for (l of gridLines(); track l.key) {
        <line
          [attr.x1]="l.x1"
          [attr.y1]="l.y1"
          [attr.x2]="l.x2"
          [attr.y2]="l.y2"
        />
      }
    </g>
  }
</svg>
